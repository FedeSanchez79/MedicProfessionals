<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historial del paciente — Medic Professionals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="page-profesional">

<nav class="navbar">
  <div style="display:flex;align-items:center;gap:12px">
    <a href="/pages/profesional.html" class="navbar-brand">
      <div class="navbar-brand-dot"></div>
      Medic Professionals
    </a>
    <span class="rol-badge">Profesional</span>
  </div>
  <div class="navbar-right">
    <span class="navbar-nombre">Dr/a. <span id="nombre-display">—</span></span>
    <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
  </div>
</nav>

<main class="main">

  <div class="page-header">
    <h1>Historial del paciente</h1>
    <p>Datos obtenidos mediante código QR.</p>
  </div>

  <!-- Estado inicial (cargando / error) -->
  <div id="estado-inicial">
    <div class="estado-cargando">Verificando acceso…</div>
  </div>

  <!-- Layout dos columnas (se muestra tras cargar datos) -->
  <div id="layout-principal" class="layout-paciente hidden">

    <!-- Columna izquierda: card del paciente -->
    <aside class="sidebar-paciente" id="sidebar-paciente">
      <!-- Populated by JS -->
    </aside>

    <!-- Columna derecha: historial + filtros -->
    <div class="content-paciente" id="content-paciente">
      <!-- Populated by JS -->
    </div>

  </div>

  <!-- Panel: Nueva atención médica (pantalla completa, separada) -->
  <div id="panel-nueva-atencion" class="hidden">

    <div class="panel-nav">
      <button class="btn-volver" id="btn-volver-historial">← Volver al historial</button>
      <div class="paso-indicator">
        <span class="paso-item activo" id="ind-paso-1">1 · Datos</span>
        <span class="paso-separator" id="paso-sep"></span>
        <span class="paso-item" id="ind-paso-2">2 · Revisión</span>
      </div>
    </div>

    <!-- Paso 1: Formulario -->
    <div id="form-paso-1">

      <div class="card-seccion">
        <div class="card-seccion-titulo">Profesional a cargo</div>
        <div class="campos-readonly">
          <div class="campo-readonly">
            <span class="dato-label">Nombre y apellido</span>
            <span class="dato-valor" id="ro-nombre">—</span>
          </div>
          <div class="campo-readonly">
            <span class="dato-label">Matrícula</span>
            <span class="dato-valor" id="ro-matricula">—</span>
          </div>
          <div class="campo-readonly">
            <span class="dato-label">Institución</span>
            <span class="dato-valor" id="ro-institucion">—</span>
          </div>
          <div class="campo-readonly">
            <span class="dato-label">Fecha y hora</span>
            <span class="dato-valor" id="ro-fecha">—</span>
          </div>
        </div>
      </div>

      <div class="card-seccion">
        <div class="card-seccion-titulo">Atención médica</div>

        <div class="campo">
          <label for="at-tipo">Tipo de práctica</label>
          <select id="at-tipo">
            <option value="">Seleccioná un tipo</option>
            <option value="consulta">Consulta médica</option>
            <option value="estudio">Estudio médico</option>
            <option value="practica">Práctica médica</option>
          </select>
        </div>

        <div class="campo">
          <label for="at-subtipo">Subtipo</label>
          <select id="at-subtipo" disabled>
            <option value="">Primero seleccioná un tipo</option>
          </select>
        </div>

        <div class="campo">
          <label for="at-motivo">Motivo de consulta <span style="color:var(--text-secondary);font-weight:400">(opcional)</span></label>
          <textarea id="at-motivo" rows="2" placeholder="Motivo por el que consulta el paciente…"></textarea>
        </div>

        <div class="campo">
          <label for="at-diagnostico">Diagnóstico <span style="color:var(--text-secondary);font-weight:400">(opcional)</span></label>
          <input type="text" id="at-diagnostico" placeholder="Diagnóstico presuntivo o confirmado">
        </div>

        <div class="campo">
          <button type="button" id="btn-toggle-vitales" class="btn-toggle-seccion">+ Agregar signos vitales</button>
          <div id="seccion-vitales" class="seccion-colapsable hidden">
            <div class="grid-vitales">
              <div class="campo">
                <label for="at-vital-pa">Presión arterial</label>
                <input type="text" id="at-vital-pa" placeholder="ej: 120/80">
              </div>
              <div class="campo">
                <label for="at-vital-fc">Frecuencia cardíaca (bpm)</label>
                <input type="number" id="at-vital-fc" placeholder="ej: 72">
              </div>
              <div class="campo">
                <label for="at-vital-temp">Temperatura (°C)</label>
                <input type="number" step="0.1" id="at-vital-temp" placeholder="ej: 36.5">
              </div>
              <div class="campo">
                <label for="at-vital-spo2">Saturación O₂ (%)</label>
                <input type="number" id="at-vital-spo2" placeholder="ej: 98">
              </div>
              <div class="campo">
                <label for="at-vital-peso">Peso (kg)</label>
                <input type="number" step="0.1" id="at-vital-peso" placeholder="ej: 70">
              </div>
              <div class="campo">
                <label for="at-vital-talla">Talla (cm)</label>
                <input type="number" id="at-vital-talla" placeholder="ej: 170">
              </div>
            </div>
          </div>
        </div>

        <!-- Sección dinámica según subtipo -->
        <div id="seccion-cirugia" class="seccion-dinamica hidden">
          <div class="campo">
            <label for="at-procedimiento">Procedimiento realizado</label>
            <textarea id="at-procedimiento" rows="3" placeholder="Describí el procedimiento realizado…"></textarea>
          </div>
          <div class="campo">
            <label for="at-complicaciones">Complicaciones</label>
            <textarea id="at-complicaciones" rows="3" placeholder="Complicaciones durante o posteriores al procedimiento…"></textarea>
          </div>
        </div>

        <div id="seccion-odontograma" class="seccion-dinamica hidden">
          <div class="campo">
            <label>Odontograma</label>
            <div id="odontograma-container"></div>
            <div id="odontograma-notas"></div>
          </div>
        </div>

        <div id="seccion-psico" class="seccion-dinamica hidden">
          <div class="campo">
            <label for="at-sesion-numero">Número de sesión</label>
            <input type="number" id="at-sesion-numero" min="1" placeholder="ej: 1">
          </div>
          <div class="campo">
            <label for="at-estado-animico">Estado anímico</label>
            <select id="at-estado-animico">
              <option value="">Seleccioná una opción</option>
              <option value="Estable">Estable</option>
              <option value="Ansioso">Ansioso</option>
              <option value="Deprimido">Deprimido</option>
              <option value="Agitado">Agitado</option>
              <option value="Mejoría">Mejoría</option>
              <option value="Otro">Otro</option>
            </select>
          </div>
        </div>

        <div class="campo">
          <label for="at-medicacion">Medicación recetada <span style="color:var(--text-secondary);font-weight:400">(opcional)</span></label>
          <textarea id="at-medicacion" rows="2" placeholder="Nombre del medicamento, dosis, frecuencia…"></textarea>
        </div>

        <div class="campo">
          <label for="at-indicaciones">Indicaciones al paciente <span style="color:var(--text-secondary);font-weight:400">(opcional)</span></label>
          <textarea id="at-indicaciones" rows="2" placeholder="Indicaciones, recomendaciones, próximos pasos…"></textarea>
        </div>

        <div class="campo">
          <label for="at-descripcion">Descripción / notas</label>
          <textarea id="at-descripcion" rows="4" placeholder="Observaciones, diagnóstico, indicaciones…"></textarea>
        </div>

        <div class="campo campo-archivo">
          <label for="at-adjunto">Adjunto <span style="color:var(--text-secondary);font-weight:400">(opcional)</span></label>
          <input type="file" id="at-adjunto" accept="image/*,.pdf">
          <span class="archivo-hint">Imágenes o PDF · máximo 5 MB</span>
          <div id="at-adjunto-error" class="error-archivo hidden"></div>
          <div id="at-adjunto-preview" class="archivo-preview hidden"></div>
        </div>
      </div>

      <div id="error-paso-1" class="error-inline hidden"></div>

      <div class="panel-footer">
        <button type="button" id="btn-cancelar-atencion" class="btn-cancelar">Cancelar</button>
        <button type="button" id="btn-previsualizar" class="btn-guardar">Previsualizar →</button>
      </div>
    </div>

    <!-- Paso 2: Previsualización -->
    <div id="form-paso-2" class="hidden">

      <div id="preview-contenido" class="preview-card">
        <!-- populated by JS -->
      </div>

      <div id="error-paso-2" class="error-inline hidden"></div>

      <div class="panel-footer">
        <button type="button" id="btn-volver-editar" class="btn-cancelar">← Volver a editar</button>
        <button type="button" id="btn-confirmar" class="btn-guardar">Confirmar y guardar</button>
      </div>
    </div>

  </div>

</main>

<div id="mensaje-global"></div>

<script>
const API = window.location.hostname === 'localhost'
  ? 'https://localhost:3001'
  : 'https://medicprofessionals-production.up.railway.app';

const MEDICDATA_API = window.location.hostname === 'localhost'
  ? 'https://localhost:3001'
  : 'https://medicdata-production.up.railway.app';

const jwtToken = sessionStorage.getItem('token');
const role     = sessionStorage.getItem('role');
const nombre   = sessionStorage.getItem('nombre');

if (!jwtToken || role !== 'professional') {
  window.location.href = '/';
}

document.getElementById('nombre-display').textContent = nombre || 'Profesional';

document.getElementById('btn-logout').addEventListener('click', () => {
  sessionStorage.clear();
  localStorage.removeItem('prof_token');
  window.location.href = '/';
});

function toast(msg, tipo = 'exito') {
  const el = document.getElementById('mensaje-global');
  el.textContent = msg;
  el.className = tipo;
  setTimeout(() => { el.className = ''; }, 3500);
}

const tipoLabels = {
  diagnostico: 'Diagnóstico',
  medicacion:  'Medicación',
  alergia:     'Alergia',
  cirugia:     'Cirugía',
  vacuna:      'Vacuna',
  estudio:     'Estudio',
  nota:        'Nota'
};

function formatFecha(val) {
  if (!val) return null;
  const [y, m, d] = val.split('-');
  if (y && m && d) return `${d}/${m}/${y}`;
  return val;
}

function renderArchivo(item) {
  if (!item.archivo_path) return '';
  const fileUrl = `${API}/archivo/${item.archivo_path}?token=${encodeURIComponent(jwtToken)}`;
  const isImage = item.archivo_tipo && item.archivo_tipo.startsWith('image/');
  const isVideo = item.archivo_tipo && item.archivo_tipo.startsWith('video/');

  if (isImage) {
    return `<div class="historial-archivo">
      <a href="${fileUrl}" target="_blank" rel="noopener">
        <img src="${fileUrl}" alt="${item.archivo_nombre}" class="historial-archivo-img" loading="lazy" />
      </a>
      <div class="historial-archivo-nombre">${item.archivo_nombre}</div>
    </div>`;
  }
  if (isVideo) {
    return `<div class="historial-archivo">
      <video controls class="historial-archivo-video" preload="metadata">
        <source src="${fileUrl}" type="${item.archivo_tipo}" />
        Tu navegador no soporta la reproducción de video.
      </video>
      <div class="historial-archivo-nombre">${item.archivo_nombre}</div>
    </div>`;
  }
  return `<div class="historial-archivo">
    <a href="${fileUrl}" target="_blank" rel="noopener" class="historial-archivo-link" download="${item.archivo_nombre}">
      📎 ${item.archivo_nombre}
    </a>
  </div>`;
}

function renderDato(label, valor) {
  const vacio = !valor;
  return `<div class="dato-item">
    <span class="dato-label">${label}</span>
    <span class="dato-valor${vacio ? ' vacio' : ''}">${valor || 'No registrado'}</span>
  </div>`;
}

/* ── Estado global ─────────────────────────────────────────────────────────── */
let pacienteActual  = null;
let historialActual = [];

/* ── Render historial filtrado ─────────────────────────────────────────────── */
function renderHistorialFiltrado(items) {
  const container = document.getElementById('historial-lista-container');
  const badge     = document.getElementById('badge-count');
  if (!container) return;

  if (badge) badge.textContent = `${historialActual.length} registro${historialActual.length !== 1 ? 's' : ''}`;

  if (!items.length) {
    container.innerHTML = `<div class="historial-vacio">Sin resultados para los filtros aplicados.</div>`;
    return;
  }

  container.innerHTML = `<div class="historial-lista">
    ${items.map(item => `
      <div class="historial-item">
        <span class="tipo-badge tipo-${item.tipo}">${tipoLabels[item.tipo] || item.tipo}</span>
        <div class="historial-item-body">
          <div class="historial-item-titulo">${item.titulo || item.subtipo || item.tipo || '—'}</div>
          ${item.descripcion ? `<div class="historial-item-desc">${item.descripcion}</div>` : ''}
          ${renderArchivo(item)}
          <div class="historial-item-meta">
            ${item.fecha_registro ? `Fecha: ${item.fecha_registro} · ` : ''}
            Registrado el ${new Date(item.created_at).toLocaleDateString('es-AR')}
            ${(item.prof_nombre || item.prof_apellido) ? `· Por ${item.prof_nombre || ''} ${item.prof_apellido || ''}` : ''}
          </div>
        </div>
      </div>
    `).join('')}
  </div>`;
}

/* ── Aplicar filtros ───────────────────────────────────────────────────────── */
function aplicarFiltros() {
  const texto = (document.getElementById('filtro-texto')?.value || '').toLowerCase();
  const tipo  = document.getElementById('filtro-tipo')?.value || '';
  const desde = document.getElementById('filtro-desde')?.value || '';
  const hasta = document.getElementById('filtro-hasta')?.value || '';

  const filtrado = historialActual.filter(item => {
    if (texto && !(
      (item.titulo   || '').toLowerCase().includes(texto) ||
      (item.descripcion || '').toLowerCase().includes(texto) ||
      (item.tipo     || '').toLowerCase().includes(texto) ||
      (item.subtipo  || '').toLowerCase().includes(texto)
    )) return false;

    if (tipo && item.tipo !== tipo) return false;

    const fechaItem = item.fecha_registro || (item.created_at || '').slice(0, 10);
    if (desde && fechaItem && fechaItem < desde) return false;
    if (hasta && fechaItem && fechaItem > hasta) return false;

    return true;
  });

  renderHistorialFiltrado(filtrado);
}

/* ── Render vista principal (sidebar + content) ────────────────────────────── */
function renderVista(paciente, historial) {
  pacienteActual  = paciente;
  historialActual = historial;

  const iniciales = `${(paciente.first_name || '?')[0]}${(paciente.last_name || '?')[0]}`.toUpperCase();
  const count     = historial.length;

  /* Sidebar: card del paciente */
  document.getElementById('sidebar-paciente').innerHTML = `
    <div class="card-paciente-sidebar">
      <div class="paciente-avatar-grande">${iniciales}</div>
      <div class="paciente-nombre" style="font-size:1rem;margin-bottom:0.2rem">${paciente.first_name} ${paciente.last_name}</div>
      <div class="paciente-meta">${paciente.email}${paciente.phone ? ' · ' + paciente.phone : ''}</div>
      <div class="sidebar-datos-grid">
        ${renderDato('DNI', paciente.dni)}
        ${renderDato('Nacimiento', formatFecha(paciente.fecha_nacimiento))}
        ${renderDato('Cobertura médica', paciente.cobertura_medica)}
        ${renderDato('N.º de afiliado', paciente.numero_afiliado)}
      </div>
    </div>
  `;

  /* Content: historial header + filtros + lista */
  document.getElementById('content-paciente').innerHTML = `
    <div class="historial-header">
      <h2>Historial médico</h2>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span class="badge-count" id="badge-count">${count} registro${count !== 1 ? 's' : ''}</span>
        <button class="btn-nueva-atencion" onclick="abrirFormNuevaAtencion()">+ Nueva atención</button>
      </div>
    </div>

    <div class="filtros-historial">
      <div class="filtro-campo">
        <input type="text" id="filtro-texto" placeholder="Buscar en historial…" />
      </div>
      <div class="filtro-campo">
        <select id="filtro-tipo">
          <option value="">Todos los tipos</option>
          <option value="diagnostico">Diagnóstico</option>
          <option value="medicacion">Medicación</option>
          <option value="alergia">Alergia</option>
          <option value="cirugia">Cirugía</option>
          <option value="vacuna">Vacuna</option>
          <option value="estudio">Estudio</option>
          <option value="nota">Nota</option>
        </select>
      </div>
      <div class="filtro-campo" style="min-width:130px;max-width:160px">
        <input type="date" id="filtro-desde" title="Desde" />
      </div>
      <div class="filtro-campo" style="min-width:130px;max-width:160px">
        <input type="date" id="filtro-hasta" title="Hasta" />
      </div>
      <button class="btn-limpiar-filtros" id="btn-limpiar-filtros">✕ Limpiar</button>
    </div>

    <div id="historial-lista-container"></div>
  `;

  renderHistorialFiltrado(historial);

  /* Wire up filter events */
  document.getElementById('filtro-texto').addEventListener('input',  aplicarFiltros);
  document.getElementById('filtro-tipo').addEventListener('change',  aplicarFiltros);
  document.getElementById('filtro-desde').addEventListener('change', aplicarFiltros);
  document.getElementById('filtro-hasta').addEventListener('change', aplicarFiltros);
  document.getElementById('btn-limpiar-filtros').addEventListener('click', () => {
    document.getElementById('filtro-texto').value  = '';
    document.getElementById('filtro-tipo').value   = '';
    document.getElementById('filtro-desde').value  = '';
    document.getElementById('filtro-hasta').value  = '';
    renderHistorialFiltrado(historialActual);
  });

  /* Show two-column layout */
  document.getElementById('estado-inicial').classList.add('hidden');
  document.getElementById('layout-principal').classList.remove('hidden');
}

function mostrarError(titulo, detalle) {
  document.getElementById('estado-inicial').innerHTML = `
    <div class="estado-error">
      <h2>${titulo}</h2>
      <p>${detalle}</p>
    </div>
  `;
  document.getElementById('layout-principal').classList.add('hidden');
}

async function cargarPaciente() {
  const params  = new URLSearchParams(window.location.search);
  const qrToken = params.get('token');

  if (!qrToken) {
    mostrarError('Token no encontrado', 'El enlace no contiene un código QR válido.');
    return;
  }

  try {
    const res  = await fetch(`${API}/qr/acceder/${qrToken}`, {
      headers: { 'Authorization': `Bearer ${jwtToken}` }
    });
    const data = await res.json();

    if (res.status === 410) {
      mostrarError('QR expirado', 'El código QR venció. El paciente debe generar uno nuevo.');
      return;
    }
    if (!res.ok) {
      mostrarError('Acceso denegado', data.message || 'QR inválido o ya utilizado.');
      return;
    }

    renderVista(data.paciente, data.historial);
  } catch {
    mostrarError('Error de conexión', 'No se pudo conectar con el servidor. Verificá tu conexión.');
  }
}

/* ── Perfil del profesional ────────────────────────────────────────────────── */
let perfilProfesional = {};

async function cargarPerfilProfesional() {
  try {
    const res = await fetch(`${API}/perfil`, {
      headers: { 'Authorization': `Bearer ${jwtToken}` }
    });
    if (res.ok) perfilProfesional = await res.json();
  } catch (_) {}
}

/* ── Nueva atención médica ─────────────────────────────────────────────────── */
const subtiposMap = {
  consulta: ['Primera consulta', 'Consulta de seguimiento', 'Guardia', 'Teleconsulta', 'Atención odontológica', 'Consulta psicológica/psiquiátrica', 'Otro'],
  estudio:  ['Análisis de sangre', 'Radiografía', 'Ecografía', 'Tomografía', 'Resonancia', 'Electrocardiograma', 'Otro'],
  practica: ['Vacuna', 'Curación', 'Inyectable', 'Nebulización', 'Cirugía menor', 'Otro']
};

/* FDI: numeración de piezas dentarias adultas (32) */
const FDI_SUPERIOR = [18, 17, 16, 15, 14, 13, 12, 11, 21, 22, 23, 24, 25, 26, 27, 28];
const FDI_INFERIOR = [48, 47, 46, 45, 44, 43, 42, 41, 31, 32, 33, 34, 35, 36, 37, 38];
let odontogramaState = {};

function renderOdontograma() {
  const cellW    = 38;
  const toothSize = 28;
  const gapCuadrante = 14;
  const filas = [
    { dientes: FDI_SUPERIOR, y: 8 },
    { dientes: FDI_INFERIOR, y: 90 }
  ];

  let svgItems = '';
  filas.forEach(fila => {
    fila.dientes.forEach((num, i) => {
      const extra   = i >= 8 ? gapCuadrante : 0;
      const x       = i * cellW + extra;
      const marcado = !!odontogramaState[num]?.marcado;
      svgItems += `
        <g class="diente" data-pieza="${num}">
          <rect x="${x}" y="${fila.y}" width="${toothSize}" height="${toothSize}" rx="5"
            fill="${marcado ? 'var(--accent-green)' : 'var(--bg-surface-2)'}"
            stroke="${marcado ? 'var(--accent-green)' : 'var(--borde)'}" stroke-width="1.5" />
          <text x="${x + toothSize / 2}" y="${fila.y + toothSize / 2 + 4}" text-anchor="middle"
            font-size="9" fill="${marcado ? '#0c1620' : 'var(--text-secondary)'}" font-family="DM Sans, sans-serif">${num}</text>
        </g>`;
    });
  });

  const svgWidth  = 16 * cellW + gapCuadrante;
  const svgHeight = 90 + toothSize + 8;

  const container = document.getElementById('odontograma-container');
  container.innerHTML = `<svg viewBox="0 0 ${svgWidth} ${svgHeight}" class="odontograma-svg" xmlns="http://www.w3.org/2000/svg">${svgItems}</svg>`;

  container.querySelectorAll('.diente').forEach(g => {
    g.addEventListener('click', () => {
      const pieza = g.getAttribute('data-pieza');
      if (odontogramaState[pieza]?.marcado) {
        delete odontogramaState[pieza];
      } else {
        odontogramaState[pieza] = { marcado: true, nota: '' };
      }
      renderOdontograma();
      renderOdontogramaNotas();
    });
  });
}

function renderOdontogramaNotas() {
  const cont   = document.getElementById('odontograma-notas');
  const piezas = Object.keys(odontogramaState).sort((a, b) => a - b);

  if (!piezas.length) {
    cont.innerHTML = `<p class="odontograma-vacio">Hacé click en una pieza dentaria para marcarla y agregar una nota.</p>`;
    return;
  }

  cont.innerHTML = piezas.map(num => `
    <div class="odontograma-nota-item">
      <span class="odontograma-nota-pieza">Pieza ${num}</span>
      <input type="text" class="odontograma-nota-input" data-pieza="${num}" placeholder="Nota (caries, ausente, tratamiento…)" value="${odontogramaState[num].nota || ''}">
    </div>
  `).join('');

  cont.querySelectorAll('.odontograma-nota-input').forEach(input => {
    input.addEventListener('input', () => {
      const pieza = input.getAttribute('data-pieza');
      if (odontogramaState[pieza]) odontogramaState[pieza].nota = input.value;
    });
  });
}

function obtenerOdontogramaTexto() {
  const piezas = Object.keys(odontogramaState).sort((a, b) => a - b);
  if (!piezas.length) return '';
  return piezas.map(num => {
    const nota = (odontogramaState[num].nota || '').trim();
    return `Pieza ${num}${nota ? `: ${nota}` : ''}`;
  }).join('; ');
}

/* Mostrar/ocultar la sección dinámica según el subtipo elegido */
function actualizarSeccionesDinamicas() {
  const subtipo     = document.getElementById('at-subtipo').value.toLowerCase();
  const secCirugia  = document.getElementById('seccion-cirugia');
  const secOdonto   = document.getElementById('seccion-odontograma');
  const secPsico    = document.getElementById('seccion-psico');

  secCirugia.classList.add('hidden');
  secOdonto.classList.add('hidden');
  secPsico.classList.add('hidden');

  if (subtipo.includes('cirug')) {
    secCirugia.classList.remove('hidden');
  } else if (subtipo.includes('odonto') || subtipo.includes('dental')) {
    secOdonto.classList.remove('hidden');
    renderOdontograma();
    renderOdontogramaNotas();
  } else if (subtipo.includes('psico') || subtipo.includes('psiquiat')) {
    secPsico.classList.remove('hidden');
  }
}

/* Recolecta los valores de los campos extendidos del formulario */
function obtenerDatosExtendidos() {
  const subtipo = document.getElementById('at-subtipo').value.toLowerCase();
  return {
    motivo:         document.getElementById('at-motivo').value.trim(),
    diagnostico:    document.getElementById('at-diagnostico').value.trim(),
    vitales: {
      pa:    document.getElementById('at-vital-pa').value.trim(),
      fc:    document.getElementById('at-vital-fc').value.trim(),
      temp:  document.getElementById('at-vital-temp').value.trim(),
      spo2:  document.getElementById('at-vital-spo2').value.trim(),
      peso:  document.getElementById('at-vital-peso').value.trim(),
      talla: document.getElementById('at-vital-talla').value.trim()
    },
    procedimiento:  document.getElementById('at-procedimiento').value.trim(),
    complicaciones: document.getElementById('at-complicaciones').value.trim(),
    sesionNumero:   document.getElementById('at-sesion-numero').value.trim(),
    estadoAnimico:  document.getElementById('at-estado-animico').value,
    medicacion:     document.getElementById('at-medicacion').value.trim(),

    esCirugia: subtipo.includes('cirug'),
    esOdonto:  subtipo.includes('odonto') || subtipo.includes('dental'),
    esPsico:   subtipo.includes('psico') || subtipo.includes('psiquiat')
  };
}

/* Arma el texto de "descripción" enviado al backend, con todos los campos completados */
function construirDescripcionCompleta(datos, descripcionBase) {
  const partes = [];

  if (datos.motivo)      partes.push(`Motivo de consulta: ${datos.motivo}`);
  if (datos.diagnostico) partes.push(`Diagnóstico: ${datos.diagnostico}`);

  const v = datos.vitales;
  const vitalesPartes = [];
  if (v.pa)    vitalesPartes.push(`PA: ${v.pa}`);
  if (v.fc)    vitalesPartes.push(`FC: ${v.fc} bpm`);
  if (v.temp)  vitalesPartes.push(`Temp: ${v.temp} °C`);
  if (v.spo2)  vitalesPartes.push(`SpO₂: ${v.spo2} %`);
  if (v.peso)  vitalesPartes.push(`Peso: ${v.peso} kg`);
  if (v.talla) vitalesPartes.push(`Talla: ${v.talla} cm`);
  if (vitalesPartes.length) partes.push(`Signos vitales: ${vitalesPartes.join(', ')}`);

  if (datos.esCirugia) {
    if (datos.procedimiento)  partes.push(`Procedimiento realizado: ${datos.procedimiento}`);
    if (datos.complicaciones) partes.push(`Complicaciones: ${datos.complicaciones}`);
  }

  if (datos.esOdonto) {
    const odonto = obtenerOdontogramaTexto();
    if (odonto) partes.push(`Odontograma: ${odonto}`);
  }

  if (datos.esPsico) {
    if (datos.sesionNumero)  partes.push(`Número de sesión: ${datos.sesionNumero}`);
    if (datos.estadoAnimico) partes.push(`Estado anímico: ${datos.estadoAnimico}`);
  }

  if (datos.medicacion)   partes.push(`Medicación recetada: ${datos.medicacion}`);
  if (datos.indicaciones) partes.push(`Indicaciones al paciente: ${datos.indicaciones}`);
  if (descripcionBase)    partes.push(`Descripción / notas: ${descripcionBase}`);

  return partes.join('\n');
}

/* Genera el HTML de previsualización para los campos extendidos completados */
function renderPreviewExtra(datos) {
  let html = '';

  if (datos.motivo) {
    html += `<div class="preview-seccion">
      <div class="preview-seccion-titulo">Motivo de consulta</div>
      <div class="preview-descripcion">${datos.motivo}</div>
    </div>`;
  }

  if (datos.diagnostico) {
    html += `<div class="preview-seccion">
      <div class="preview-seccion-titulo">Diagnóstico</div>
      <div class="preview-descripcion">${datos.diagnostico}</div>
    </div>`;
  }

  const v = datos.vitales;
  const vitalesItems = [];
  if (v.pa)    vitalesItems.push(['Presión arterial', v.pa]);
  if (v.fc)    vitalesItems.push(['Frecuencia cardíaca', `${v.fc} bpm`]);
  if (v.temp)  vitalesItems.push(['Temperatura', `${v.temp} °C`]);
  if (v.spo2)  vitalesItems.push(['Saturación O₂', `${v.spo2} %`]);
  if (v.peso)  vitalesItems.push(['Peso', `${v.peso} kg`]);
  if (v.talla) vitalesItems.push(['Talla', `${v.talla} cm`]);
  if (vitalesItems.length) {
    html += `<div class="preview-seccion">
      <div class="preview-seccion-titulo">Signos vitales</div>
      <div class="preview-grid">
        ${vitalesItems.map(([label, val]) => `
          <div class="preview-item">
            <span class="preview-item-label">${label}</span>
            <span class="preview-item-value">${val}</span>
          </div>`).join('')}
      </div>
    </div>`;
  }

  if (datos.esCirugia && (datos.procedimiento || datos.complicaciones)) {
    html += `<div class="preview-seccion">
      <div class="preview-seccion-titulo">Cirugía</div>
      ${datos.procedimiento  ? `<div class="dato-item"><span class="dato-label">Procedimiento realizado</span><div class="preview-descripcion">${datos.procedimiento}</div></div>`   : ''}
      ${datos.complicaciones ? `<div class="dato-item"><span class="dato-label">Complicaciones</span><div class="preview-descripcion">${datos.complicaciones}</div></div>` : ''}
    </div>`;
  }

  if (datos.esOdonto) {
    const odonto = obtenerOdontogramaTexto();
    if (odonto) {
      html += `<div class="preview-seccion">
        <div class="preview-seccion-titulo">Odontograma</div>
        <div class="preview-descripcion">${odonto}</div>
      </div>`;
    }
  }

  if (datos.esPsico && (datos.sesionNumero || datos.estadoAnimico)) {
    html += `<div class="preview-seccion">
      <div class="preview-seccion-titulo">Salud mental</div>
      <div class="preview-grid">
        ${datos.sesionNumero  ? `<div class="preview-item"><span class="preview-item-label">Número de sesión</span><span class="preview-item-value">${datos.sesionNumero}</span></div>`   : ''}
        ${datos.estadoAnimico ? `<div class="preview-item"><span class="preview-item-label">Estado anímico</span><span class="preview-item-value">${datos.estadoAnimico}</span></div>` : ''}
      </div>
    </div>`;
  }

  if (datos.medicacion) {
    html += `<div class="preview-seccion">
      <div class="preview-seccion-titulo">Medicación recetada</div>
      <div class="preview-descripcion">${datos.medicacion}</div>
    </div>`;
  }

  if (datos.indicaciones) {
    html += `<div class="preview-seccion">
      <div class="preview-seccion-titulo">Indicaciones al paciente</div>
      <div class="preview-descripcion">${datos.indicaciones}</div>
    </div>`;
  }

  return html;
}

/* Adjunto: validación 5 MB y previsualización */
document.getElementById('at-adjunto').addEventListener('change', async (e) => {
  const file    = e.target.files[0];
  const preview = document.getElementById('at-adjunto-preview');
  const errEl   = document.getElementById('at-adjunto-error');

  preview.classList.add('hidden');
  preview.innerHTML = '';
  errEl.classList.add('hidden');
  adjuntoBase64 = null;
  adjuntoNombre = null;
  adjuntoMime   = null;

  if (!file) return;

  if (file.size > 5 * 1024 * 1024) {
    errEl.textContent = 'El archivo supera el límite de 5 MB.';
    errEl.classList.remove('hidden');
    e.target.value = '';
    return;
  }

  try {
    const dataUrl = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = (ev) => resolve(ev.target.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    adjuntoBase64 = dataUrl.split(',')[1];
    adjuntoNombre = file.name;
    adjuntoMime   = file.type;

    if (file.type.startsWith('image/')) {
      preview.innerHTML = `<img src="${dataUrl}" alt="preview" class="archivo-preview-img" />`;
    } else {
      preview.innerHTML = `<span class="archivo-preview-nombre">📎 ${file.name}</span>`;
    }
    preview.classList.remove('hidden');
  } catch {
    errEl.textContent = 'No se pudo leer el archivo.';
    errEl.classList.remove('hidden');
    e.target.value = '';
  }
});

/* Confirmar y guardar */
document.getElementById('btn-confirmar').addEventListener('click', async () => {
  const btn     = document.getElementById('btn-confirmar');
  const errorEl = document.getElementById('error-paso-2');

  btn.disabled    = true;
  btn.textContent = 'Guardando…';
  errorEl.classList.add('hidden');

  const tipo        = document.getElementById('at-tipo').value;
  const subtipo     = document.getElementById('at-subtipo').value;
  const descripcion = document.getElementById('at-descripcion').value.trim();
  const datosExtra  = obtenerDatosExtendidos();
  const descripcionCompleta = construirDescripcionCompleta(datosExtra, descripcion);

  const body = {
    patient_id:              pacienteActual.id,
    tipo:                    tipoDisplayMap[tipo],
    subtipo:                 subtipo,
    descripcion:             descripcionCompleta || null,
    fecha:                   fechaHoraISO,
    profesional_nombre:      nombre || '',
    profesional_matricula:   perfilProfesional.matricula   || '',
    profesional_institucion: perfilProfesional.institucion || '',
    adjunto_base64:          adjuntoBase64 || null,
    adjunto_nombre:          adjuntoNombre || null
  };

  const bodyResumen = {
    ...body,
    adjunto_base64: adjuntoBase64 ? `[base64 omitido, ${adjuntoBase64.length} caracteres ~ ${(adjuntoBase64.length * 0.75 / 1024).toFixed(1)} KB]` : null
  };

  try {
    const res = await fetch(`${MEDICDATA_API}/historial/paciente/cargar`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${jwtToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (res.status === 201) {
      let savedRecord = null;
      try {
        const data = await res.json();
        savedRecord = data.record || (data.id ? data : null);
      } catch (_) {}

      const nuevoItem = savedRecord || {
        tipo:           tipo,
        subtipo:        subtipo,
        titulo:         subtipo,
        descripcion:    descripcionCompleta || null,
        fecha_registro: fechaHoraISO.slice(0, 10),
        created_at:     fechaHoraISO,
        prof_nombre:    nombre || '',
        prof_apellido:  '',
        archivo_path:   null,
        archivo_tipo:   adjuntoMime  || null,
        archivo_nombre: adjuntoNombre || null
      };

      historialActual = [...historialActual, nuevoItem];
      cerrarFormNuevaAtencion();
      renderVista(pacienteActual, historialActual);
      toast('Atención guardada correctamente');
      return;
    }

    let errMsg = 'Error al guardar la atención. Intentá de nuevo.';
    let errBody = null;
    try {
      errBody = await res.json();
      errMsg  = errBody.message || errMsg;
    } catch (_) {}
    console.error(`Error al guardar atención (HTTP ${res.status}):`, errBody || '(sin cuerpo de respuesta)', 'Payload enviado:', bodyResumen);
    errorEl.textContent = errMsg;
    errorEl.classList.remove('hidden');

  } catch (err) {
    console.error('Error de conexión al guardar atención:', err, 'Payload:', bodyResumen);
    errorEl.textContent = 'Error de conexión. Revisá tu red e intentá de nuevo.';
    errorEl.classList.remove('hidden');
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Confirmar y guardar';
  }
});
